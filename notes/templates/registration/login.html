{% extends "notes/base.html" %}

{% block title %}Logowanie - {% endblock %}

{% block content %}
<div class="form-page">
    <div class="card">
        <h2 class="form-page__title">Logowanie</h2>
        <form method="post" class="styled-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn--primary btn--block">Zaloguj</button>
        </form>
        <p style="margin-top: var(--space-3); font-size: 0.85rem; color: var(--text-dim);">
            Nie masz konta? <a href="{% url 'notes:register' %}">Zarejestruj się</a>
        </p>
    </div>
</div>
{% endblock %}
