<div class="reader__toolbar">
    <button type="button" class="reader__menu-btn" aria-label="Otwórz menu">☰</button>
    <div class="reader__title">
        <strong>{{ current_note.title }}</strong>
        <span class="reader__meta">{{ current_note.run.course.name }}</span>
    </div>
    <div class="reader__actions">
        <a class="btn btn--ghost" href="{{ current_note.pdf.url }}" download>Pobierz PDF</a>
        <button type="button" class="btn" id="print-btn">Drukuj</button>
    </div>
</div>
<div class="reader__content" id="pdf-scroll" data-pdf-url="{{ current_note.pdf.url }}">
    <div id="pdf-pages"></div>
</div>
