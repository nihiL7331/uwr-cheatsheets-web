{% extends "notes/base.html" %}

{% block title %}Przedmioty - UWr Cheatsheets{% endblock %}

{% block content %}
<h2>Przedmioty</h2>
{% if courses %}
<ul>
    {% for course in courses %}
    <li><a href="{% url 'notes:course_detail' course.pk %}">{{ course.name }}</a></li>
    {% endfor %}
</ul>
{% else %}
<p>Brak przedmiotow</p>
{% endif %}
{% endblock %}
